<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Query</title>

    <link rel="stylesheet" href="./style-responsive-sizes.css" />
    <style>
      div {
        background-color: rebeccapurple;
        height: 500px;
        width: 500px;
      }

      /* CSS for screens below or equal to 600px wide */
      @media (max-width: 600px) {
        div {
          height: 200px;
          width: 200px;
        }
      }
    </style>
  </head>

  <body>
    <h1>Media Query</h1>
    <div></div>
  </body>
</html>
