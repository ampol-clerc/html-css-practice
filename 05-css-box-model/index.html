<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Box Model</title>
    <style>
      /* CSS Box Model Project */

      /* Set their sizes to 200px heigh by 200px wide */
      div {
        height: 200px;
        width: 200px;
      }

      /* Fix the style of the <p> element to remove all margins */
      p {
        margin: 0px;
      }

      /* Set different background colors each boxes */
      /* Set the 1st div to have 20px padding all around with a black 10px border */
      /* Set the margins for the divs so that each boxes corner touches the other */
      #box1 {
        background-color: cadetblue;
        padding: 20px;
        border: 10px solid black;
      }

      /* Set the 2nd div to have a 20px border on top and bottom and 10px border left and right */
      #box2 {
        background-color: gold;
        border: solid black;
        border-width: 20px 10px;
        margin-left: 260px;
      }

      /* Set the 3rd div to have a 10px border */
      #box3 {
        background-color: indianred;
        border: 10px solid black;
        margin-left: 40px;
      }
    </style>
  </head>

  <body>
    <!-- Create 3 Boxes using the div element -->

    <div id="box1">
      <p>
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Repellat
        tempore velit ex minima repudiandae illum iusto ipsam cumque laudantium
        amet.
      </p>
    </div>
    <div id="box2"></div>
    <div id="box3"></div>
  </body>
</html>
