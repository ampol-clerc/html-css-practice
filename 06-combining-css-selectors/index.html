<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Combining CSS Selectors</title>
    <style>
      /* Group selector - change the h1 and h2 color to blueviolet */
      h1,
      h2 {
        color: blueviolet;
      }

      /* Child selector - change the first paragraph color to firebrick */
      .box > p {
        color: firebrick;
      }

      /* Descendent selector - color the list item elements blue */
      .box li {
        color: blue;
      }

      /* Chained specific - to color the 2nd and 3rd list item green */
      li.done {
        color: green;
      }

      /* Multiple Combiners */
      ul p.done {
        font-size: 0.5rem;
      }
    </style>
  </head>

  <body>
    <!-- Combining CSS Selectors project -->

    <h1>To Do List</h1>
    <h2>Monday</h2>

    <div class="box">
      <p class="done">Do these things today!</p>
      <ul class="list">
        <li>Wash Clothes</li>
        <li class="done">Read</li>
        <li class="done">Maths Questions</li>
      </ul>
    </div>

    <ul>
      <p class="done">Other items</p>
    </ul>
    <p>The best preparation for tomorrow is doing your best today.</p>
  </body>
</html>
